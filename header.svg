<svg width="860" height="180" viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&amp;display=swap');
      
      .name-text {
        font-family: 'Google Sans', 'Segoe UI', system-ui, sans-serif;
        font-size: 52px;
        font-weight: 700;
        fill: #0a0a0a;
        letter-spacing: -2px;
      }
      .role-text {
        font-family: 'Google Sans', 'Segoe UI', system-ui, sans-serif;
        font-size: 17px;
        font-weight: 400;
        fill: #555555;
        letter-spacing: 0.3px;
      }
      .accent-dot {
        fill: #B5E64D;
        animation: pulse3d 2.4s ease-in-out infinite;
        transform-origin: 818px 42px;
      }
      .bar-accent {
        fill: #B5E64D;
        animation: slideIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
      }
      .name-anim {
        animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s both;
      }
      .role-anim {
        animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.28s both;
      }
      .links-anim {
        animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.44s both;
      }
      .card-3d {
        animation: float3d 4s ease-in-out infinite;
        transform-origin: 810px 90px;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideIn {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }
      @keyframes pulse3d {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%       { transform: scale(1.18); opacity: 0.82; }
      }
      @keyframes float3d {
        0%, 100% { transform: translateY(0px) rotateX(0deg); }
        50%       { transform: translateY(-6px) rotateX(2deg); }
      }
    </style>
    
    <!-- 3D card drop shadow filter -->
    <filter id="shadow3d" x="-10%" y="-10%" width="130%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="11.15" flood-color="#B5E64D" flood-opacity="0.28" result="s1"/>
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.08" result="s2"/>
      <feMerge><feMergeNode in="s1"/><feMergeNode in="s2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="iconShadow" x="-20%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="11.15" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
    
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#f0f0f0" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="860" height="180" fill="#ffffff" rx="12"/>
  <rect width="860" height="180" fill="url(#grid)" rx="12" opacity="0.6"/>
  
  <!-- Top accent bar -->
  <rect class="bar-accent" x="0" y="0" width="860" height="4" rx="2" style="transform-origin: left center"/>
  
  <!-- Floating 3D card element (right side decoration) -->
  <g class="card-3d" filter="url(#shadow3d)">
    <rect x="720" y="28" width="110" height="68" rx="10" fill="#0a0a0a"/>
    <rect x="720" y="28" width="110" height="4" rx="2" fill="#B5E64D"/>
    <text x="733" y="56" font-family="'Google Sans', system-ui" font-size="10" fill="#B5E64D" font-weight="600" letter-spacing="1">OPEN TO WORK</text>
    <text x="733" y="72" font-family="'Google Sans', system-ui" font-size="9" fill="#888888">Remote / Worldwide</text>
    <text x="733" y="86" font-family="'Google Sans', system-ui" font-size="9" fill="#888888">Full-Stack · AI/ML</text>
    <circle class="accent-dot" cx="818" cy="42" r="4"/>
  </g>
  
  <!-- Name -->
  <g class="name-anim">
    <text x="32" y="72" class="name-text">Ramanathan</text>
    <text x="32" y="126" class="name-text" fill="#B5E64D">Rishiharan</text>
  </g>
  
  <!-- Role line -->
  <g class="role-anim">
    <text x="34" y="152" class="role-text">Co-Director @ Binory · Frontend Dev @ Un4cus · BSc CS + AI, NIBM</text>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="176" width="860" height="4" rx="2" fill="#B5E64D" opacity="0.25"/>
</svg>